<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Fondo redondeado oscuro (tema de la app) -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0b0f14"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#22c55e" stroke-width="12"/>

  <!-- Pan (baguette estilizada en diagonal) -->
  <g transform="rotate(-35 256 236)">
    <ellipse cx="256" cy="236" rx="150" ry="86" fill="#d97706"/>
    <ellipse cx="256" cy="222" rx="146" ry="76" fill="#f59e0b"/>
    <!-- Cortes del pan -->
    <g stroke="#92400e" stroke-width="14" stroke-linecap="round">
      <line x1="196" y1="182" x2="176" y2="252"/>
      <line x1="256" y1="172" x2="236" y2="248"/>
      <line x1="316" y1="182" x2="296" y2="252"/>
    </g>
  </g>

  <!-- Etiqueta de precio -->
  <g transform="rotate(12 352 356)">
    <rect x="292" y="316" width="150" height="84" rx="18" fill="#22c55e"/>
    <text x="367" y="376" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#0b0f14" text-anchor="middle">$</text>
  </g>
</svg>
